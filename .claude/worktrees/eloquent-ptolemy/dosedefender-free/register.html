<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — DoseDefender</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2744;--navy2:#1a3a5c;--teal:#00a896;--teal-light:#e6f9f7;--teal-mid:#7fd8d0;--text:#1a2332;--muted:#64748b;--border:#e2e8f0;--bg:#f0f4f8;--white:#fff;--red:#dc2626;--green:#16a34a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:linear-gradient(160deg,#060f1c 0%,#0f2744 55%,#091e38 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:white;border-radius:20px;padding:48px 44px 40px;max-width:420px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.45);}
.logo{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;color:var(--navy);margin-bottom:4px;letter-spacing:-.02em;}
.logo em{color:var(--teal);font-style:normal;}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:36px;}
.field{margin-bottom:18px;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Sora',sans-serif;color:var(--text);outline:none;transition:border-color .15s;}
input:focus{border-color:var(--teal);}
.btn{width:100%;background:var(--teal);color:white;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;margin-top:8px;}
.btn:hover{background:#008a7c;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;}
.trust{background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:10px;padding:12px 16px;font-size:12px;color:#0a7060;margin-bottom:20px;line-height:1.6;}
.footer{text-align:center;margin-top:24px;font-size:13px;color:var(--muted);}
.footer a{color:var(--teal);text-decoration:none;font-weight:600;}
.legal{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6;}
.legal a{color:var(--muted);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Dose<em>Defender</em></div>
  <div class="eyebrow">Clinical Calculators · Create Account</div>

  <div class="trust">✓ Free forever &nbsp;·&nbsp; ✓ No credit card required &nbsp;·&nbsp; ✓ No patient data stored</div>

  <div class="error" id="error-msg"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@hospital.org" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password">
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
  </div>

  <button class="btn" id="reg-btn" onclick="doRegister()">Create Free Account</button>

  <div class="legal">By registering you agree to our <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.<br>DoseDefender is for licensed healthcare professionals only.</div>

  <div class="footer" style="margin-top:16px;">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script>
async function doRegister() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('reg-btn');
  errEl.style.display = 'none';

  if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = ''; return; }
  if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = ''; return; }
  if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = ''; return; }

  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const r = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Registration failed');
    localStorage.setItem('dosedefender_token', data.token);
    // Set disclaimer as accepted (they just agreed to ToS)
    localStorage.setItem('dosedefender_disclaimer_accepted', '1');
    window.location.href = '/app-v2?welcome=1';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = '';
    btn.disabled = false; btn.textContent = 'Create Free Account';
  }
}

if (localStorage.getItem('dosedefender_token')) window.location.href = '/app-v2';
</script>
</body>
</html>
